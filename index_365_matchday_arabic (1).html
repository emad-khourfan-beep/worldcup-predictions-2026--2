<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>توقعات المباريات</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #071b3a, #0b4f8a);
      color: #fff;
      direction: rtl;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 25px;
    }

    h1, h2 {
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #00c2ff;
      color: #001b33;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #777;
      cursor: not-allowed;
    }

    .match {
      background: rgba(255,255,255,0.15);
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 18px;
    }

    .teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      gap: 15px;
    }

    .team {
      flex: 1;
      text-align: center;
    }

    .vs {
      font-size: 16px;
      opacity: 0.8;
    }

    .score-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .locked {
      color: #ffb3b3;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    th {
      background: rgba(0,0,0,0.25);
    }

    .status {
      text-align: center;
      margin: 15px 0;
      font-weight: bold;
    }

    .success {
      color: #9cffb1;
    }

    .error {
      color: #ffb3b3;
    }

    .small {
      font-size: 13px;
      opacity: 0.8;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🏆 توقعات المباريات</h1>
    <p class="small">يتم إغلاق التوقع قبل ساعة من بداية كل مباراة</p>

    <div class="card">
      <h2>بيانات المشارك</h2>
      <input id="playerName" type="text" placeholder="اكتب اسمك" />
      <input id="whatsapp" type="text" placeholder="رقم واتساب - اختياري" />
    </div>

    <div class="card">
      <h2>مباريات اليوم</h2>
      <div id="status" class="status">جاري تحميل المباريات...</div>
      <div id="matches"></div>
    </div>

    <div class="card">
      <h2>جدول الترتيب</h2>
      <button onclick="loadLeaderboard()">تحديث الترتيب</button>
      <div id="leaderboardStatus" class="status"></div>
      <table>
        <thead>
          <tr>
            <th>الترتيب</th>
            <th>الاسم</th>
            <th>النقاط</th>
          </tr>
        </thead>
        <tbody id="leaderboard"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbymFV1IOihICbNAu5STmuZg9FsDO5UkZ805ndgLO3-4EgdbDoBb0aTNykr6R2r_ClWEzg/exec";

    let matchesData = [];

    document.addEventListener("DOMContentLoaded", () => {
      loadMatches();
      loadLeaderboard();
    });

    async function loadMatches() {
      const status = document.getElementById("status");
      const matchesBox = document.getElementById("matches");

      status.textContent = "جاري تحميل المباريات...";
      status.className = "status";
      matchesBox.innerHTML = "";

      try {
        const response = await fetch(API_URL + "?action=getMatches");
        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "فشل تحميل المباريات");
        }

        matchesData = data.matches || [];

        if (matchesData.length === 0) {
          status.textContent = "لا توجد مباريات متاحة اليوم.";
          return;
        }

        status.textContent = "";
        renderMatches();

      } catch (error) {
        console.error(error);
        status.textContent = "❌ فشل تحميل المباريات. تأكد من رابط Apps Script ومن النشر Web App.";
        status.className = "status error";
      }
    }

    function renderMatches() {
      const matchesBox = document.getElementById("matches");
      matchesBox.innerHTML = "";

      matchesData.forEach(match => {
        const isLocked = match.locked === true || match.locked === "TRUE";

        const div = document.createElement("div");
        div.className = "match";

        div.innerHTML = `
          <div class="teams">
            <div class="team">${match.home}</div>
            <div class="vs">ضد</div>
            <div class="team">${match.away}</div>
          </div>

          <p class="small">
            التاريخ: ${match.date || ""} | الوقت: ${match.time || ""}
          </p>

          ${
            isLocked
            ? `<div class="locked">🔒 تم إغلاق التوقع لهذه المباراة</div>`
            : `
              <div class="score-inputs">
                <input type="number" min="0" id="home_${match.id}" placeholder="أهداف ${match.home}" />
                <input type="number" min="0" id="away_${match.id}" placeholder="أهداف ${match.away}" />
              </div>
              <button onclick="submitPrediction('${match.id}')">إرسال التوقع</button>
            `
          }
        `;

        matchesBox.appendChild(div);
      });
    }

    async function submitPrediction(matchId) {
      const name = document.getElementById("playerName").value.trim();
      const whatsapp = document.getElementById("whatsapp").value.trim();
      const homeScore = document.getElementById("home_" + matchId).value;
      const awayScore = document.getElementById("away_" + matchId).value;

      if (!name) {
        alert("الرجاء كتابة الاسم");
        return;
      }

      if (homeScore === "" || awayScore === "") {
        alert("الرجاء إدخال توقع نتيجة الفريقين");
        return;
      }

      const match = matchesData.find(m => String(m.id) === String(matchId));

      if (!match) {
        alert("المباراة غير موجودة");
        return;
      }

      const payload = {
        action: "submitPrediction",
        name: name,
        whatsapp: whatsapp,
        matchId: matchId,
        home: match.home,
        away: match.away,
        homeScore: Number(homeScore),
        awayScore: Number(awayScore)
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "لم يتم الإرسال");
        }

        alert("✅ تم إرسال التوقع بنجاح");
        loadLeaderboard();

      } catch (error) {
        console.error(error);
        alert("❌ حدث خطأ أثناء إرسال التوقع");
      }
    }

    async function loadLeaderboard() {
      const tbody = document.getElementById("leaderboard");
      const status = document.getElementById("leaderboardStatus");

      tbody.innerHTML = "";
      status.textContent = "جاري تحميل الترتيب...";

      try {
        const response = await fetch(API_URL + "?action=getLeaderboard");
        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "فشل تحميل الترتيب");
        }

        const rows = data.leaderboard || [];

        if (rows.length === 0) {
          status.textContent = "لا توجد نتائج حتى الآن.";
          return;
        }

        status.textContent = "";

        rows.forEach((row, index) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${row.name}</td>
            <td>${row.points}</td>
          `;
          tbody.appendChild(tr);
        });

      } catch (error) {
        console.error(error);
        status.textContent = "❌ فشل تحميل جدول الترتيب";
        status.className = "status error";
      }
    }
  </script>
</body>
</html>
