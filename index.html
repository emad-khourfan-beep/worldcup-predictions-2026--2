<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسابقة توقعات كأس العالم</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
.container{max-width:900px;margin:auto;background:white;padding:20px;border-radius:16px}
h1{text-align:center;color:#0b3d91}
input{padding:8px;margin:4px;width:90px}
button{padding:10px 18px;background:#0b3d91;color:white;border:0;border-radius:8px;cursor:pointer}
.match{background:#eef3ff;padding:12px;margin:10px 0;border-radius:10px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#0b3d91;color:white}
</style>
</head>

<body>
<div class="container">
<h1>🏆 مسابقة توقعات كأس العالم 2026</h1>

<label>اسم المشارك:</label>
<input id="playerName" placeholder="الاسم" style="width:180px">

<div id="matches"></div>

<button onclick="addPrediction()">إضافة التوقع</button>
<button onclick="calculateRanking()">حساب الترتيب</button>

<h2>📊 الترتيب</h2>
<table>
<thead>
<tr>
<th>المركز</th>
<th>الاسم</th>
<th>النقاط</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>
</div>

<script>
const matches = [
  { id: 1, home: "ألمانيا", away: "كوراساو", actualHome: null, actualAway: null },
  { id: 2, home: "هولندا", away: "اليابان", actualHome: null, actualAway: null },
  { id: 3, home: "ساحل العاج", away: "الإكوادور", actualHome: null, actualAway: null },
  { id: 4, home: "السويد", away: "تونس", actualHome: null, actualAway: null }
];

let players = [];

function renderMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach(match => {
    container.innerHTML += `
      <div class="match">
        <strong>${match.home} × ${match.away}</strong><br>
        توقع ${match.home}: 
        <input type="number" min="0" id="p_home_${match.id}">
        توقع ${match.away}: 
        <input type="number" min="0" id="p_away_${match.id}">
        <br>
        النتيجة الفعلية ${match.home}: 
        <input type="number" min="0" id="a_home_${match.id}">
        النتيجة الفعلية ${match.away}: 
        <input type="number" min="0" id="a_away_${match.id}">
      </div>
    `;
  });
}

function calculatePoints(predictedHome, predictedAway, actualHome, actualAway) {
  let points = 0;

  if (predictedHome === actualHome && predictedAway === actualAway) {
    return 10;
  }

  const predictedResult =
    predictedHome > predictedAway ? "HOME" :
    predictedHome < predictedAway ? "AWAY" : "DRAW";

  const actualResult =
    actualHome > actualAway ? "HOME" :
    actualHome < actualAway ? "AWAY" : "DRAW";

  if (predictedResult === actualResult) {
    points += 5;
  }

  if (predictedHome === actualHome) points += 2;
  if (predictedAway === actualAway) points += 2;

  return points;
}

function addPrediction() {
  const name = document.getElementById("playerName").value.trim();

  if (!name) {
    alert("اكتب اسم المشارك");
    return;
  }

  const predictions = [];

  for (const match of matches) {
    const predictedHome = Number(document.getElementById(`p_home_${match.id}`).value);
    const predictedAway = Number(document.getElementById(`p_away_${match.id}`).value);

    predictions.push({
      matchId: match.id,
      predictedHome,
      predictedAway
    });
  }

  players.push({ name, predictions, totalPoints: 0 });

  alert("تمت إضافة التوقع بنجاح");
  document.getElementById("playerName").value = "";
}

function updateActualResults() {
  matches.forEach(match => {
    const homeValue = document.getElementById(`a_home_${match.id}`).value;
    const awayValue = document.getElementById(`a_away_${match.id}`).value;

    match.actualHome = homeValue === "" ? null : Number(homeValue);
    match.actualAway = awayValue === "" ? null : Number(awayValue);
  });
}

function calculateRanking() {
  updateActualResults();

  players.forEach(player => {
    let total = 0;

    player.predictions.forEach(prediction => {
      const match = matches.find(m => m.id === prediction.matchId);

      if (match.actualHome !== null && match.actualAway !== null) {
        total += calculatePoints(
          prediction.predictedHome,
          prediction.predictedAway,
          match.actualHome,
          match.actualAway
        );
      }
    });

    player.totalPoints = total;
  });

  players.sort((a, b) => b.totalPoints - a.totalPoints);

  const ranking = document.getElementById("ranking");
  ranking.innerHTML = "";

  players.forEach((player, index) => {
    ranking.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${player.name}</td>
        <td>${player.totalPoints}</td>
      </tr>
    `;
  });
}

renderMatches();
</script>
</body>
</html>
